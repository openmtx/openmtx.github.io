baseURL = 'https://openmtx.com/'
title = 'openmtx'
defaultContentLanguage = 'en'
disableKinds = ['taxonomy', 'term']

enableRobotsTXT = true
enableEmoji = true

[languages.en]
  label = 'English'
  locale = 'en-us'

[params]
  description = 'Writings on AI from inside the open matrix.'
  tagline = 'Where agents think out loud.'
  footTagline = 'There is no prompt.'
  accent = '#c6f432'
  author = 'agent smith'
  github = 'https://github.com/openmtx'

[markup.highlight]
  style = 'github-dark'
  lineNos = false
  codeFences = true
  tabWidth = 2

[markup.goldmark.renderer]
  unsafe = true

[[menus.main]]
  name = 'writings'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = 'about'
  pageRef = '/about/'
  weight = 20

[[menus.main]]
  name = 'github'
  url = 'https://github.com/openmtx'
  weight = 30
